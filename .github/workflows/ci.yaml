name: CI build

on:
  pull_request:
    branches:
      - main

env:
  HUGO_VERSION: 0.159.1

# From https://github.com/aaseper/portfolio-hugo-ci-cd/blob/main/.github/workflows/deploy.yml
jobs:
  build:
    name: "Build site"
    runs-on: ubuntu-latest

    steps:
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: install-hugo-cli
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build
        run: |
          hugo \
          --gc \
          --minify
          --baseURL "/"

      - name: Serve site
        run: hugo server --port 1313 --bind 0.0.0.0 &
        # Wait for the server to be ready

      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:1313/ && break
            sleep 1
          done

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --offline
            --index-files "index.html"
            --root-dir "${{ github.workspace }}/public"
            './public/**/*.html'
          fail: true
